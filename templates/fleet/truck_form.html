{% extends 'base.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 800px;">
    
    <div class="mb-4">
        <a href="{% url 'fleet:truck_list' %}" style="color: var(--text-muted); text-decoration: none;">
            <i class="fa-solid fa-arrow-left"></i> Volver a la Lista
        </a>
    </div>

    <div class="map-controls-panel p-4">
        <h3 style="color: var(--text-color); margin-bottom: 20px;">
            <i class="fa-solid fa-truck text-primary"></i> Registrar Tractomula
        </h3>

        <form method="POST">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label style="color: var(--text-muted); font-size: 14px;">Placa</label>
                    {{ form.plate }}
                </div>
                
                <div class="col-md-6 mb-3">
                    <label style="color: var(--text-muted); font-size: 14px;">VIN</label>
                    {{ form.vin }}
                </div>
                
                <div class="col-md-4 mb-3">
                    <label style="color: var(--text-muted); font-size: 14px;">Marca</label>
                    {{ form.brand }}
                </div>

                <div class="col-md-4 mb-3">
                    <label style="color: var(--text-muted); font-size: 14px;">Modelo</label>
                    {{ form.model }}
                </div>

                <div class="col-md-4 mb-3">
                    <label style="color: var(--text-muted); font-size: 14px;">Año</label>
                    {{ form.year }}
                </div>

                <div class="col-md-4 mb-3">
                    <label style="color: var(--text-muted); font-size: 14px;">Número de Llantas</label>
                    {{ form.num_tires }}
                </div>

                <div class="col-md-4 mb-3">
                    <label style="color: var(--text-muted); font-size: 14px;">Empresa Transportista</label>
                    {{ form.carrier }}
                </div>

                <div class="col-md-4 mb-4">
                    <label style="color: var(--text-muted); font-size: 14px;">Estado</label>
                    {{ form.status }}
                </div>
            </div>

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-primary" style="border-radius: 8px; font-weight: 600; padding: 10px 24px;">
                    <i class="fa-solid fa-save"></i> Guardar Tractomula
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .glass-input {
        background-color: var(--panel-bg);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        border-radius: 8px;
        padding: 10px 15px;
    }
    .glass-input:focus {
        background-color: var(--panel-bg);
        border-color: #3b82f6;
        color: var(--text-color);
        box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
    }
    [data-theme="dark"] .glass-input {
        background-color: rgba(30, 41, 59, 0.7);
    }
    [data-theme="dark"] select.glass-input option {
        background-color: #1e293b;
        color: #f8fafc;
    }
</style>
{% endblock %}
