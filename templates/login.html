{% extends "base.html" %}
{% load static %}

{% block title %}Ingresar | PIN{% endblock %}

{% block layout %}
<div class="auth-layout">
    <div class="glass auth-card">
        <div class="auth-brand-container">
            <img src="{% static 'img/LOGO.jpeg' %}" alt="Ambientronika Logo" class="auth-logo">
            <h1 class="auth-title">PIN</h1>
        </div>
        <p class="auth-subtitle">Acceso seguro a la inteligencia logística</p>
        
        <form action="{% url 'dashboard' %}">
            <div class="form-group">
                <label for="email">Correo Corporativo</label>
                <input type="email" id="email" class="form-control" placeholder="analista@ambientronika.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.85rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); margin: 0; cursor: pointer;">
                    <input type="checkbox"> Recordarme
                </label>
                <a href="#" style="color: var(--brand-blue); text-decoration: none; font-weight: 500;">¿Olvidaste tu contraseña?</a>
            </div>
            
            <button type="submit" class="btn-primary">Ingresar al Sistema</button>
        </form>
        
        <p style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
            Protegido por protocolos de encriptación ambiental. <br> &copy; 2026 Ambientronika Ltda.
        </p>
    </div>
</div>
{% endblock %}
