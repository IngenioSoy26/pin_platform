{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PIN | Ambientronika{% endblock %}</title>
    
    <!-- Fuentes Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet CSS (Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- CSS del Sistema de Diseño -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>
    <div class="topo-background"></div>
    
    {% block layout %}
    <!-- Layout por defecto (App) -->
    <div class="app-layout">
        {% include 'includes/sidebar.html' %}
        
        <main class="main-content">
            {% include 'includes/navbar.html' %}
            
            <div class="page-container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    {% endblock %}

    <script>
        // Lógica simple para Dark Mode
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';       
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            // Disparar evento para que el mapa cambie de estilo si está abierto
            window.dispatchEvent(new Event('themeChanged'));
        }

        // Cargar preferencia guardada
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';        
            document.documentElement.setAttribute('data-theme', savedTheme);    
        });
    </script>
    
    <!-- Leaflet JS (Mapas) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script src="{% static 'js/custom.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
